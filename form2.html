 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Information</title>
    <link rel="stylesheet" href="style.css">    
 </head>
 <body>
       <div class="form-frame">
          <div class="navbar">
              <h3>Application Form</h3>
                <ul>
                 <li><a href="index.html">Personal Information</a></li>
                 <li><a href="form1.html">Medical Information</a></li>
                 <li><a href="form2.html">Educational Information</a></li>
                 <li><a href="form3.html">Guidance Information</a></li>
              </ul>  
          </div>
           <div class="content">
              <h1>
                  Educational Information
              </h1>
              <p>Please provide your educational background.</p>
              <div class="form">
                 <form action="form3.html" method="post">
                     <label for="school">School</label>
                     <input type="text" id="school" name="school" required>
                     
                     <label for="degree">Degree</label>
                      <input type="text" id="degree" name="degree" required>
                    
                     <label for="graduation">Graduation Year</label>
                      <input type="number" id="graduation" name="graduation" required min="1980" max="2026"> 
                      
                     <label for="field of study">Field of Study</label>
                      <input type="text" id="field of study" required name="field of study">
                     
                      <input type="submit" value="Next">
                   </form>
               </div>
         </div>
       </div>
 </body>
 </html>
