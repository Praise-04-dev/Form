<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="form-frame">
        <div class="navbar">
           <h3>Application Form</h3>
         <ul>
             <li><a href="index.html">Personal Information</a></li>
             <li><a href="form1.html">Medical Information</a></li>
             <li><a href="form2.html">Educational Information</a></li>
             <li><a href="form3.html">Guidance Information</a></li>
          </ul>  
          </div>
        <div class="content">
         <h1 >
            Personal Information
          </h1>
          <p>Please provide your basic personal details.</p>
         <div class="form">
            <form action="form1.html" method="get">
             <label for="name">Full Name</label>
             <input type="text" id="name" name="name" required>
             
             <label for="date_of_birth">Date of Birth</label>
             <input type="date" id="date_of_birth" name="date_of_birth" required>
             
             <label for="gender">Gender</label>
             <select id="gender" name="gender"required>
                 <option value="male">Male</option>
                 <option value="female">Female</option>
                  <option value="other">Other</option>
               </select>
             
             <label for="marital_status">Martial Status </label>
              <select name="marital_status" id="marital_status" required>
                 <option value="single">Single</option>
                  <option value="married">Married</option>
                 <option value="divorced">Divorced</option>
                 <option value="widowed">Widowed</option>
              </select>
                <label for="email">Email Address</label>
              <input type="email" id="email" name="email" required>
             
             <label for="phone">Phone Number</label>
             <input type="tel" id="phone" name="phone" required>
             
             <label for="address">Address</label>
             <input type="text" id="address" name="address" required>
            
             <label for="origin">State of Origin:</label>
              <select name="origin" id="origin" required>
                  <option value="abia">ABIA</option>
                  <option value="abamawa">ADAMAWA</option>
                  <option value="akwa_ibom">AKWA IBOM</option>
                  <option value="anambra">ANAMBRA</option>
                  <option value="bauchi">BAUCHI</option>
                  <option value="bayelsa">BAYELSA</option>
                  <option value="benue">BENUE</option>
                  <option value="borno">BORNO</option>
                  <option value="cross_river">CROSS RIVER</option>
                  <option value="delta">DELTA</option>
                  <option value="ebonyi">EBONYI</option>
                 <option value="edo">EDO</option>
                 <option value="ekiti">EKITI</option>
                  <option value="enugu">ENUGU</option>
                 <option value="gombe">GOMBE</option>
                  <option value="imo">IMO</option>
                 <option value="jigawa">JIGAWA</option>
                  <option value="kaduna">KADUNA</option>
                 <option value="kano">KANO</option>
                 <option value="katsina">KATSINA</option>    
                 <option value="kebbi">KEBBI</option>
                 <option value="kogi">KOGI</option>
                 <option value="kwara">KWARA</option>
                 <option value="lagos">LAGOS</option>
                 <option value="nasarawa">NASARAWA</option>
                 <option value="niger">NIGER</option>
                 <option value="ogun">OGUN</option>
                 <option value="ondo">ONDO</option>
                 <option value="osun">OSUN</option>
                 <option value="oyo">OYO</option>    
                 <option value="plateau">PLATEAU</option>
                 <option value="rivers">RIVERS</option>
                 <option value="sokoto">SOKOTO</option>
                 <option value="taraba">TARABA</option>
                  <option value="yobe">YOBE</option>
                 <option value="zamfara">ZAMFARA</option>
                </select>
              
              <label for="religion">Religion:</label>
               <select id="religion" name="religion" required>
                  <option value="christianity">Christianity</option>
                  <option value="islam">Islam</option>
                 <option value="traditional">Traditional</option>
              </select>
              
              <label for="occupation">Occupation:</label>
              <input type="text" id="occupation" name="occupation" required>
            
              <label for="nation">Nationality:</label>
                <select name="nation" id="nation" required>
                   <option value="nigerian">Nigerian</option>
                   <option value="ghanaian">Ghanaian</option>
                  <option value="cameroonian">Cameroonian</option>
                  <option value="other">Other</option>
               </select>
             
             <input type="submit" value="Next">
              </form>
            </div>
       </div>
    </div>
</body>
</html>
