<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Information</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-frame">
        <div class="navbar">
          <h3>Application Form</h3>
           <ul>
              <li><a href="index.html">Personal Information</a></li>
             <li><a href="form1.html">Medical Information</a></li>
             <li><a href="form2.html">Educational Information</a></li>
             <li><a href="form3.html">Guidance Information</a></li>
           </ul>  
        </div>
       <div class="content">
          <h1>Medical Information</h1>
           <p>Please provide your medical details</p>
           <div class="form">
              <form action="form2.html" method="get">
                  <label for="bloodgroup">Blood Group:</label>
                   <select name="bloodgroup" id="bloodgroup">
                      <option value="A+">A+</option>
                      <option value="A-">A-</option>
                      <option value="B+">B+</option>
                      <option value="B-">B-</option>
                      <option value="O+">O+</option>
                     <option value="O-">O-</option>
                     <option value="AB+">AB+</option>
                      <option value="AB-">AB-</option>
                  </select>
                
                  <label for="genotype">Genotype</label>
                   <select name="genotype" id="genotype">
                      <option value="AA">AA</option>
                     <option value="AS">AS</option>
                      <option value="SS">SS</option>
                     <option value="AC">AC</option>
                      <option value="SC">SC</option>
                      <option value="CC">CC</option>
                  </select>
                
                 <label for="allergies">Allergies</label>
                  <input type="text" id="allergies">
                  
                 <label for="medicalcondition">Existing Medical Conditions</label>
                  <input type="text" id="medicalcondition">
                   
                  <input type="submit" value="Next">
                </form>
           </div>
        </div>
    </div>
</body>
</html>
